name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: pip install pygbag

      - name: Build WebAssembly Version
        run: python -m pygbag --build Citesaga1-master

      - name: Upload archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: game-assets-latest
          name: Game Assets (auto-updated)
          files: |
            Citesaga1-master/build/web/citesaga1-master.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch index.html to load archive from GitHub Release
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/game-assets-latest/citesaga1-master.tar.gz"
          sed -i "s|citesaga1-master.tar.gz|${RELEASE_URL}|g" Citesaga1-master/build/web/index.html
          sed -i 's/background-color:powderblue;/background-color:black;/g' Citesaga1-master/build/web/index.html

      - name: Deploy static files to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Citesaga1-master/build/web
          exclude_assets: '*.tar.gz,*.apk'
