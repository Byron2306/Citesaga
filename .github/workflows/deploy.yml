name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: pip install pygbag

      - name: Build WebAssembly Version
        run: python -m pygbag --build .

      - name: Upload archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: game-assets-latest
          name: Game Assets (auto-updated)
          files: build/web/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch index.html and remove large files
        run: |
          ARCHIVE=$(ls build/web/*.tar.gz | xargs basename)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/game-assets-latest/${ARCHIVE}"
          sed -i "s|${ARCHIVE}|${RELEASE_URL}|g" build/web/index.html
          sed -i 's/background-color:powderblue;/background-color:black;/g' build/web/index.html
          rm -f build/web/*.tar.gz build/web/*.apk

      - name: Deploy static files to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
