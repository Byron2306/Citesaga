name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: python -m pip install pygbag==0.9.3

      - name: Build WebAssembly Version
        run: python -m pygbag --build .

      - name: Prepare Pages files
        run: |
          sed -i 's/background-color:powderblue;/background-color:black;/g' build/web/index.html
          rm -f build/web/*.apk
          touch build/web/.nojekyll

      - name: Deploy static files to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
